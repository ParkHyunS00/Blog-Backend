spring.config.import=optional:classpath:env.properties

spring.application.name=blog

spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:blog_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

admin.access-key-hash=TEST_BCRYPT_HASH
admin.otp-secret=TEST_OTP_SECRET

spring.flyway.enabled=false

app.storage.endpoint=http://localhost:9000
app.storage.bucket=test-bucket
app.storage.access-key=test-access-key
app.storage.secret-key=test-secret-key